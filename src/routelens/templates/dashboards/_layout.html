{% extends "base.html" %}
{% block body %}
<div class="wrap dashwrap">
  <aside class="dashnav" aria-label="Dashboards">
    <h2 class="dashnav-title">Dashboards</h2>
    <ul>
      {% for d in dashboards %}
      <li>
        {% if d.status == 'live' %}
          <a href="/dashboards/{{ d.slug }}"
             {% if request.path == '/dashboards/' + d.slug %}aria-current="page"{% endif %}>{{ d.title }}</a>
        {% else %}
          <span class="planned">{{ d.title }}<em>soon</em></span>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </aside>
  <main class="dashmain">{% block dashboard %}{% endblock %}</main>
</div>
<style>
  .dashwrap{display:grid;grid-template-columns:200px minmax(0,1fr);gap:20px;
    padding:20px 0 56px;align-items:start}
  .dashnav{position:sticky;top:72px;background:var(--surface2);border:1px solid var(--line);
    border-radius:var(--r);padding:10px 0}
  .dashnav-title{font-size:.6875rem;font-weight:600;color:var(--faint);margin:0 0 6px;
    padding:0 14px;text-transform:uppercase;letter-spacing:.06em}
  .dashnav ul{list-style:none;margin:0;padding:0;font-size:.8125rem}
  .dashnav li a,.dashnav li .planned{display:flex;justify-content:space-between;align-items:center;
    padding:7px 14px;color:var(--muted)}
  .dashnav li a:hover{color:var(--ink);background:var(--inset);text-decoration:none}
  .dashnav li a[aria-current="page"]{color:var(--ink);background:var(--inset);font-weight:600}
  .dashnav .planned{color:var(--faint);cursor:default}
  .dashnav .planned em{font-style:normal;font-family:var(--mono);font-size:.5625rem;
    border:1px solid var(--line);border-radius:999px;padding:1px 6px}
  .dashmain{display:flex;flex-direction:column;gap:14px;min-width:0}
  @media (max-width: 860px){
    .dashwrap{grid-template-columns:1fr}
    .dashnav{position:static}
    .dashnav ul{display:flex;flex-wrap:wrap;gap:2px}
  }
</style>
{% endblock %}
