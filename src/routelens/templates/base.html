<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RouteLens{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    :root{
      --bg:#0b0e13; --surface:#10141b; --surface2:#0d1117; --inset:#0e1218;
      --line:#1e2733; --line-strong:#2c3949;
      --ink:#dbe2ea; --muted:#93a1b3; --faint:#5d6b7d;
      --accent:#38a8ff; --accent-ink:#9fd4ff;
      --ok:#3fd68f; --warn:#f0c249; --crit:#ff5d6e;
      --r:6px;
      --z-nav:10; --z-tip:20;
      --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    }
    *{box-sizing:border-box}
    html{font-size:16px}
    body{margin:0;background:var(--bg);color:var(--ink);
      font:400 .875rem/1.55 Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
      min-height:100vh}
    a{color:var(--accent-ink);text-decoration:none}
    a:hover{text-decoration:underline}
    h1{font-size:1.375rem;font-weight:650;letter-spacing:-.015em;margin:0 0 .35rem;text-wrap:balance}
    h2{font-size:1rem;font-weight:600;margin:0}
    h3{font-size:.875rem;font-weight:600;margin:0}
    code,.mono{font-family:var(--mono);font-size:.8125rem}
    .wrap{width:min(1280px,calc(100% - 32px));margin:0 auto}

    /* top bar */
    .nav{position:sticky;top:0;z-index:var(--z-nav);background:var(--surface2);
      border-bottom:1px solid var(--line)}
    .navin{height:52px;display:flex;align-items:center;gap:20px}
    .brand{display:flex;align-items:center;gap:8px;font-weight:650;color:var(--ink);font-size:.9375rem}
    .brand:hover{text-decoration:none}
    .livedot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex:none}
    @media (prefers-reduced-motion: no-preference){
      .livedot{animation:beat 2.4s ease-out infinite}
      @keyframes beat{0%,100%{opacity:1}50%{opacity:.45}}
    }
    .navlinks{display:flex;gap:2px;font-size:.8125rem}
    .navlinks a{color:var(--muted);padding:6px 10px;border-radius:var(--r)}
    .navlinks a:hover{color:var(--ink);background:var(--inset);text-decoration:none}
    .navlinks a[aria-current="page"]{color:var(--ink);background:var(--inset)}
    .navsearch{margin-left:auto;display:flex;flex:0 1 420px}
    .navsearch input{flex:1;min-width:0;background:var(--inset);border:1px solid var(--line);
      border-radius:var(--r) 0 0 var(--r);padding:7px 10px;color:var(--ink);
      font-family:var(--mono);font-size:.8125rem}
    .navsearch input::placeholder{color:var(--muted)}
    .navsearch input:focus{outline:none;border-color:var(--accent)}
    .navsearch button{background:var(--accent);border:1px solid var(--accent);color:#04121f;
      font-weight:600;font-size:.8125rem;padding:7px 14px;border-radius:0 var(--r) var(--r) 0;cursor:pointer}
    .navsearch button:hover{filter:brightness(1.1)}

    /* page scaffolding */
    main.wrap{padding:20px 0 56px;display:flex;flex-direction:column;gap:14px}
    .pagehead{padding:22px 0 4px}
    .pagehead p{color:var(--muted);margin:.2rem 0 0;max-width:70ch}

    /* panels */
    .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
      padding:14px 16px;min-width:0}
    .panelgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
    .phead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
      margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
    .srctag{font-family:var(--mono);font-size:.6875rem;color:var(--faint);white-space:nowrap}

    /* key/value rows */
    .kv{display:flex;justify-content:space-between;gap:16px;padding:5px 0;
      border-bottom:1px solid var(--line);font-size:.8125rem}
    .kv:last-child{border-bottom:0}
    .kv span{color:var(--muted)}
    .kv strong{font-weight:500;font-family:var(--mono);text-align:right;overflow-wrap:anywhere}

    /* tables */
    .tablewrap{overflow-x:auto;margin:0 -16px;padding:0 16px}
    .datatable{width:100%;border-collapse:collapse;font-size:.8125rem;font-variant-numeric:tabular-nums}
    .datatable th{font-size:.6875rem;font-weight:600;color:var(--muted);text-transform:none;
      text-align:left;padding:6px 12px 6px 0;border-bottom:1px solid var(--line-strong);white-space:nowrap}
    .datatable td{padding:6px 12px 6px 0;border-bottom:1px solid var(--line);vertical-align:top}
    .datatable tbody tr:hover{background:var(--inset)}
    .datatable .mono,.datatable td.mono{font-family:var(--mono)}
    td.num{text-align:right}

    /* status badges: dot + text, colour never alone */
    .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);
      font-size:.6875rem;padding:2px 8px;border-radius:999px;border:1px solid var(--line-strong);
      color:var(--muted);white-space:nowrap}
    .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
    .badge.healthy,.badge.valid{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 35%,transparent)}
    .badge.warning{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,transparent)}
    .badge.critical,.badge.invalid{color:var(--crit);border-color:color-mix(in srgb,var(--crit) 35%,transparent)}
    .badge.unknown{color:var(--muted)}

    .empty{border:1px dashed var(--line-strong);border-radius:var(--r);padding:14px 16px;color:var(--muted)}
    .empty strong{color:var(--ink)}
    .empty p{margin:.3rem 0 0;font-size:.8125rem}
    .loading{color:var(--faint);font-size:.8125rem}
    .err{color:var(--crit);font-size:.8125rem}
    .attribution{color:var(--faint);font-size:.6875rem;margin:.6rem 0 0}
    .pre{background:var(--inset);border:1px solid var(--line);border-radius:var(--r);
      padding:10px 12px;overflow-x:auto;font-family:var(--mono);font-size:.75rem;
      line-height:1.5;color:var(--muted);margin:.6rem 0 0}

    footer.site{border-top:1px solid var(--line);color:var(--faint);font-size:.75rem;
      padding:14px 0 22px;margin-top:26px}
    footer.site .wrap{display:flex;flex-wrap:wrap;gap:6px 18px}

    @media (max-width: 760px){
      .navin{flex-wrap:wrap;height:auto;padding:8px 0;gap:8px}
      .navsearch{flex-basis:100%;order:3}
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav"><div class="wrap navin">
    <a class="brand" href="/"><span class="livedot" aria-hidden="true"></span>RouteLens</a>
    <div class="navlinks">
      <a href="/" {% if request.path == '/' %}aria-current="page"{% endif %}>Pulse</a>
    </div>
    <form class="navsearch" action="/q" method="get" role="search">
      <input type="search" name="query" placeholder="prefix / IP / ASN / hostname" aria-label="Query a prefix, IP, ASN or hostname"
             value="{{ request.args.get('query', '') if request.path == '/q' else '' }}">
      <button type="submit">Query</button>
    </form>
  </div></nav>
  {% block body %}{% endblock %}
  <footer class="site"><div class="wrap">
    <span>NextHop Lab</span>
    <span>Data: RIPE RIS &amp; RIPEstat · RouteViews · NLNOG Ring · Globalping · Cloudflare Radar (CC BY-NC 4.0)</span>
  </div></footer>
</body>
</html>
