<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RouteLens{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Azeret+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#000;--panel:#05070a;--panel2:#090d12;--text:#fff;--muted:#a6a6a6;--faint:rgba(255,255,255,.08);--line:rgba(0,153,255,.18);--blue:#0099ff;--blue2:#5ee4ff;--good:#46e69b;--warn:#ffd166;--bad:#ff5c7a;--shadow:0 0 0 1px rgba(0,153,255,.15),0 24px 80px rgba(0,0,0,.45)}
    *{box-sizing:border-box} body{margin:0;background:#000;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;font-feature-settings:"cv01","cv05","cv09","cv11","ss03";min-height:100vh;overflow-x:hidden}
    body:before{content:"";position:fixed;inset:-20%;pointer-events:none;background:radial-gradient(circle at 50% -10%,rgba(0,153,255,.22),transparent 32%),radial-gradient(circle at 90% 20%,rgba(94,228,255,.08),transparent 25%),linear-gradient(transparent,rgba(0,0,0,.6));z-index:-1}
    a{color:inherit;text-decoration:none}.wrap{width:min(1220px,calc(100% - 40px));margin:0 auto}.nav{position:sticky;top:0;z-index:10;background:rgba(0,0,0,.68);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}.navin{height:74px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:-.04em}.mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#5ee4ff 28%,#0099ff 58%,#001b2e 100%);box-shadow:0 0 35px rgba(0,153,255,.55)}.navlinks{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}.pill{border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);padding:10px 15px}.pill.primary{background:#fff;color:#000;border-color:#fff;font-weight:700}.hero{padding:76px 0 42px}.eyebrow{font-family:'Azeret Mono',monospace;color:var(--blue2);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}.hero h1{font-size:clamp(56px,9vw,112px);line-height:.86;letter-spacing:-.075em;margin:0 0 24px;font-weight:800;max-width:980px}.hero p{font-size:clamp(18px,2vw,23px);line-height:1.45;color:var(--muted);max-width:820px;margin:0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:34px 0 42px}.stat,.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.09);box-shadow:var(--shadow);border-radius:18px}.stat{padding:18px}.stat b{display:block;font-size:36px;letter-spacing:-.05em}.stat span{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding-bottom:70px}.card{padding:18px;min-height:220px;position:relative;overflow:hidden}.card:after{content:"";position:absolute;inset:auto -20% -40% 40%;height:120px;background:radial-gradient(circle,rgba(0,153,255,.14),transparent 60%);pointer-events:none}.cardtop{display:flex;align-items:f... [truncated]
  </style>
</head>
<body>
  <nav class="nav"><div class="wrap navin"><a class="brand" href="/"><span class="mark"></span><span>RouteLens</span></a><div class="navlinks"><span class="pill">NextHop Lab</span><span class="pill">BGP</span><span class="pill">DNS</span><span class="pill primary">Route Health</span></div></div></nav>
  {% block body %}{% endblock %}
</body>
</html>
